<div
  class="fixed inset-0 z-50 flex items-center justify-center overflow-y-auto bg-stone-950/60 px-4 py-8 backdrop-blur-[1px]"
>
  <section class="w-full max-w-md overflow-hidden rounded-2xl bg-white shadow-2xl">
    <div class="px-6 pt-7 pb-6 sm:px-8">
      <h2 class="text-2xl font-semibold tracking-tight text-stone-950">Manage order</h2>
      <p class="mt-2 text-base text-stone-600">
        Order <span class="font-mono font-semibold text-stone-900">#{{ order().shortId }}</span> is
        currently
      </p>

      <span
        class="mt-3 inline-flex items-center gap-2 rounded-full px-3 py-1 text-xs font-semibold {{
          order().statusBadgeClass
        }}"
      >
        <span class="size-1.5 rounded-full {{ order().statusDotClass }}"></span>
        {{ order().statusLabel }}
      </span>

      @if (buttons().length === 0) {
        <p class="mt-6 text-sm text-stone-500">No further actions are available for this order.</p>
      } @else {
        <p class="mt-6 mb-3 text-sm font-medium text-stone-700">Move this order to:</p>
        <div class="flex flex-col gap-3">
          @for (button of buttons(); track button.action) {
            <button
              type="button"
              [class]="button.buttonClass"
              [disabled]="isSubmitting()"
              (click)="action.emit(button.action)"
            >
              {{ pendingAction() === button.action ? 'Updating...' : button.label }}
            </button>
          }
        </div>
      }
    </div>

    <footer class="flex justify-end border-t border-stone-200 px-6 py-5 sm:px-8">
      <button
        type="button"
        class="h-12 rounded-lg border border-stone-300 bg-white px-6 text-base font-semibold text-stone-900 transition hover:cursor-pointer hover:bg-stone-50 disabled:cursor-not-allowed disabled:opacity-60"
        [disabled]="isSubmitting()"
        (click)="cancelled.emit()"
      >
        Close
      </button>
    </footer>
  </section>
</div>
