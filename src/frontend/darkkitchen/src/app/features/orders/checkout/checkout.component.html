<div class="flex h-dvh">
  <app-sidebar />

  <main class="flex-1 overflow-y-auto bg-canvas px-8 py-10 lg:px-12">
    <div class="mx-auto max-w-5xl">
      <header class="mb-7">
        <a
          routerLink="/orders/new"
          class="inline-flex h-9 flex-1 items-center justify-center gap-2 rounded-lg bg-accent px-4 text-sm font-semibold text-white shadow-sm transition hover:cursor-pointer hover:bg-accent-600"
        >
          Back to catalog
        </a>
        <h1 class="mt-2 text-3xl font-bold tracking-tight text-stone-900">Checkout</h1>
        <p class="mt-1.5 text-stone-600">
          Choose delivery, enter your address and review your order
        </p>
      </header>

      <div class="grid grid-cols-1 gap-8 lg:grid-cols-5">
        <section class="flex flex-col gap-6 lg:col-span-3">
          <div class="rounded-2xl border border-white/10 bg-surface-raised p-6 shadow-sm">
            <h2 class="mb-4 text-base font-semibold text-stone-100">Delivery option</h2>
            <app-delivery-option-selector
              [deliveryTypes]="deliveryTypes()"
              [selectedId]="selectedDeliveryId()"
              (selectId)="selectDelivery($event)"
            />
          </div>

          <div class="rounded-2xl border border-white/10 bg-surface-raised p-6 shadow-sm">
            <h2 class="mb-4 text-base font-semibold text-stone-100">Delivery address</h2>
            <app-address-form
              [showErrors]="showAddressErrors()"
              (formChange)="onAddressChange($event)"
            />
          </div>
        </section>

        <aside class="lg:col-span-2 lg:sticky lg:top-10 lg:self-start">
          <div class="rounded-2xl border border-white/10 bg-surface-raised p-6 shadow-sm">
            <h2 class="mb-4 text-base font-semibold text-stone-100">Order review</h2>

            <app-order-review
              [items]="cartItems()"
              [subtotalLabel]="subtotalLabel()"
              [deliveryLabel]="deliveryLabel()"
              [totalLabel]="totalLabel()"
            />

            <button
              type="button"
              class="mt-6 inline-flex h-12 w-full items-center justify-center gap-2 rounded-lg bg-accent px-5 text-sm font-semibold text-white shadow-sm transition hover:cursor-pointer hover:bg-accent-600 disabled:cursor-not-allowed disabled:opacity-60"
              [disabled]="isSubmitting() || count() === 0"
              (click)="placeOrder()"
            >
              @if (isSubmitting()) {
                Placing order…
              } @else {
                Place order
              }
            </button>
          </div>
        </aside>
      </div>
    </div>
  </main>
</div>
