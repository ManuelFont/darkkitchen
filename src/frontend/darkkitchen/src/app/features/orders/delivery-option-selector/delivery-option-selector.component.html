<div class="grid grid-cols-1 gap-3 sm:grid-cols-2">
  @for (card of cards(); track card.id) {
    <button
      type="button"
      class="flex items-start gap-3 rounded-xl border px-4 py-3 text-left transition hover:cursor-pointer {{
        card.cardClass
      }}"
      (click)="selectId.emit(card.id)"
    >
      <span
        class="mt-0.5 flex size-5 shrink-0 items-center justify-center rounded-full border {{
          card.radioClass
        }}"
      >
        @if (card.selected) {
          <span class="size-2.5 rounded-full bg-accent"></span>
        }
      </span>

      <span>
        <span class="block text-sm font-semibold text-stone-100">{{ card.label }}</span>
        <span class="block text-xs text-stone-400">{{ card.description }}</span>
      </span>
    </button>
  }
</div>
