<div
  class="flex h-full flex-col overflow-hidden rounded-xl border border-white/10 bg-surface-raised shadow-sm transition duration-300 hover:-translate-y-1 hover:shadow-lg"
>
  <div class="relative aspect-[16/9] overflow-hidden bg-surface-sunken">
    <img
      class="h-full w-full object-cover"
      [src]="product().imagesUrls[0]"
      [alt]="product().name"
    />

    @if (discountLabel(); as label) {
      <span
        class="absolute left-3 top-3 rounded-md bg-accent px-3 py-1 text-xs font-bold tracking-wide text-white shadow-sm"
      >
        {{ label }}
      </span>
    }
  </div>

  <div class="flex flex-1 flex-col p-4">
    <h2 class="text-lg font-bold tracking-tight text-stone-100">{{ product().name }}</h2>

    <p class="mt-1 min-h-10 text-sm leading-5 text-stone-400">{{ product().description }}</p>

    <div class="mt-3 flex items-center justify-between gap-4">
      <span
        class="inline-flex rounded-md border border-white/10 bg-white/5 px-2.5 py-1 text-xs font-medium text-stone-300"
      >
        {{ product().category.name }}
      </span>

      <div class="text-right">
        @if (promoPriceLabel(); as promoPrice) {
          <p class="text-xs text-stone-500 line-through">{{ priceLabel() }}</p>
          <p class="text-lg font-bold text-accent-300">{{ promoPrice }}</p>
        } @else {
          <p class="text-lg font-bold text-stone-100">{{ priceLabel() }}</p>
        }
      </div>
    </div>

    <div class="mt-4 flex items-center gap-3">
      <div class="flex items-center rounded-lg border border-white/10">
        <button
          type="button"
          class="flex size-9 items-center justify-center rounded-l-lg text-stone-300 transition hover:cursor-pointer hover:bg-white/5 hover:text-white"
          aria-label="Decrease quantity"
          (click)="decrease()"
        >
          −
        </button>
        <span class="w-8 text-center text-sm font-semibold text-stone-100">{{ quantity() }}</span>
        <button
          type="button"
          class="flex size-9 items-center justify-center rounded-r-lg text-stone-300 transition hover:cursor-pointer hover:bg-white/5 hover:text-white"
          aria-label="Increase quantity"
          (click)="increase()"
        >
          +
        </button>
      </div>

      <button
        type="button"
        class="inline-flex h-9 flex-1 items-center justify-center gap-2 rounded-lg bg-accent px-4 text-sm font-semibold text-white shadow-sm transition hover:cursor-pointer hover:bg-accent-600"
        (click)="add()"
      >
        Add to cart
      </button>
    </div>
  </div>
</div>
