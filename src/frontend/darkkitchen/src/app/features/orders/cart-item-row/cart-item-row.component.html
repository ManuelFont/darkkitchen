<div class="flex gap-3 py-4">
  <div class="size-14 shrink-0 overflow-hidden rounded-lg bg-surface-sunken">
    <img class="h-full w-full object-cover" [src]="item().imageUrl" [alt]="item().name" />
  </div>

  <div class="min-w-0 flex-1">
    <div class="flex items-start justify-between gap-2">
      <p class="truncate text-sm font-semibold text-stone-100">{{ item().name }}</p>
      <button
        type="button"
        class="shrink-0 text-xs font-medium text-stone-500 transition hover:cursor-pointer hover:text-accent-400"
        [attr.aria-label]="'Remove ' + item().name"
        (click)="remove.emit()"
      >
        Remove
      </button>
    </div>

    <p class="mt-0.5 text-xs text-stone-400">{{ item().unitPriceLabel }} each</p>

    <div class="mt-2 flex items-center justify-between gap-2">
      <div class="flex items-center rounded-lg border border-white/10">
        <button
          type="button"
          class="flex size-7 items-center justify-center rounded-l-lg text-stone-300 transition hover:cursor-pointer hover:bg-white/5 hover:text-white"
          aria-label="Decrease quantity"
          (click)="decrease()"
        >
          −
        </button>
        <span class="w-7 text-center text-xs font-semibold text-stone-100">
          {{ item().quantity }}
        </span>
        <button
          type="button"
          class="flex size-7 items-center justify-center rounded-r-lg text-stone-300 transition hover:cursor-pointer hover:bg-white/5 hover:text-white"
          aria-label="Increase quantity"
          (click)="increase()"
        >
          +
        </button>
      </div>

      <div class="text-right">
        @if (item().originalLineLabel; as original) {
          <span class="mr-1 text-xs text-stone-500 line-through">{{ original }}</span>
        }
        <span class="text-sm font-semibold text-stone-100">{{ item().lineLabel }}</span>
      </div>
    </div>
  </div>
</div>
