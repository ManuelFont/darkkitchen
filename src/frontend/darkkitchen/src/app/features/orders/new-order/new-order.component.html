<div class="flex h-dvh">
  <app-sidebar />

  <main class="flex-1 overflow-y-auto bg-canvas px-8 py-10 lg:px-12">
    <div class="mx-auto max-w-7xl">
      <header class="mb-7">
        <a
          routerLink="/orders"
          class="inline-flex h-9 flex-1 items-center justify-center gap-2 rounded-lg bg-accent px-4 text-sm font-semibold text-white shadow-sm transition hover:cursor-pointer hover:bg-accent-600"
        >
          Back to orders
        </a>
        <h1 class="mt-2 text-3xl font-bold tracking-tight text-stone-900">New order</h1>
        <p class="mt-1.5 text-stone-600">Lookup for products and build your cart!</p>
      </header>

      <div class="grid grid-cols-1 gap-8 lg:grid-cols-3">
        <section class="lg:col-span-2">
          <div class="mb-6 flex flex-col items-stretch gap-4 sm:flex-row sm:items-center">
            <app-product-search
              class="w-full max-w-sm"
              (searchRequested)="searchProducts($event)"
            />

            <app-category-dropdown
              class="sm:ml-3"
              disabledOptionName="All categories"
              [isFirstOptionDisabled]="false"
              [selectedCategoryId]="selectedCategoryId()"
              (categorySelected)="selectCategory($event)"
            />
          </div>

          @if (products() === null) {
            <div class="grid grid-cols-1 gap-6 sm:grid-cols-2">
              @for (skeleton of [0, 1, 2, 3]; track skeleton) {
                <div class="overflow-hidden rounded-xl border border-white/10 bg-surface-raised">
                  <div class="aspect-[16/9] animate-pulse bg-white/10"></div>
                  <div class="space-y-3 p-4">
                    <div class="h-5 w-2/3 animate-pulse rounded bg-white/10"></div>
                    <div class="h-4 w-full animate-pulse rounded bg-white/10"></div>
                    <div class="h-9 w-full animate-pulse rounded bg-white/10"></div>
                  </div>
                </div>
              }
            </div>
          } @else if (products()!.length === 0) {
            <div
              class="rounded-2xl border border-white/10 bg-surface-raised px-6 py-16 text-center text-stone-400"
            >
              No products found.
            </div>
          } @else {
            <div class="grid grid-cols-1 gap-6 sm:grid-cols-2">
              @for (product of products()!; track product.id) {
                <app-order-product-card
                  [product]="product"
                  (addToCart)="addToCart(product, $event)"
                />
              }
            </div>
          }
        </section>

        <div class="lg:sticky lg:top-10 lg:self-start">
          <app-cart-panel
            [items]="cartItems()"
            [count]="count()"
            [itemsTotalLabel]="itemsTotalLabel()"
            (quantityChange)="changeQuantity($event)"
            (remove)="removeItem($event)"
            (proceed)="proceedToCheckout()"
          />
        </div>
      </div>
    </div>
  </main>
</div>
