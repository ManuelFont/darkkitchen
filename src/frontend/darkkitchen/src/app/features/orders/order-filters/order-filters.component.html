<form [formGroup]="form" class="flex flex-wrap items-end gap-4">
  <div class="flex flex-col gap-1.5">
    <label for="dateFrom" class="text-xs font-semibold uppercase tracking-widest text-stone-400">
      From
    </label>
    <input
      id="dateFrom"
      type="date"
      formControlName="dateFrom"
      class="rounded-xl border border-white/10 bg-surface-raised px-4 py-2.5 text-sm text-stone-200 focus:border-brand focus:ring-1 focus:ring-brand focus:outline-none"
    />
  </div>

  <div class="flex flex-col gap-1.5">
    <label for="dateTo" class="text-xs font-semibold uppercase tracking-widest text-stone-400">
      To
    </label>
    <input
      id="dateTo"
      type="date"
      formControlName="dateTo"
      class="rounded-xl border border-white/10 bg-surface-raised px-4 py-2.5 text-sm text-stone-200 focus:border-brand focus:ring-1 focus:ring-brand focus:outline-none"
    />
  </div>

  <div class="flex flex-col gap-1.5">
    <label for="status" class="text-xs font-semibold uppercase tracking-widest text-stone-400">
      Status
    </label>
    <div class="relative">
      <select
        id="status"
        formControlName="status"
        class="w-full appearance-none rounded-xl border border-white/10 bg-surface-raised px-4 py-2.5 pr-10 text-sm text-stone-200 focus:border-brand focus:ring-1 focus:ring-brand focus:outline-none"
      >
        <option value="">All statuses</option>
        @for (status of statuses; track status.value) {
          <option [value]="status.value">{{ status.name }}</option>
        }
      </select>

      <svg
        class="pointer-events-none absolute top-1/2 right-3 size-4 -translate-y-1/2 text-stone-400"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
      >
        <path d="m6 9 6 6 6-6" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
    </div>
  </div>

  @if (hasValue()) {
    <button
      type="button"
      class="inline-flex items-center gap-2 rounded-xl border border-stone-300 bg-white px-4 py-2.5 text-sm font-medium text-stone-700 shadow-sm transition hover:cursor-pointer hover:border-stone-400 hover:bg-stone-100 hover:text-stone-950"
      (click)="clear()"
    >
      <mat-icon class="size-4 text-base leading-none">restart_alt</mat-icon>
      Clear
    </button>
  }
</form>
