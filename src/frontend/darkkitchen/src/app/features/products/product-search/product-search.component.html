<div
  class="flex w-full items-center rounded-lg border border-stone-300 bg-white p-1 shadow-sm transition"
>
  <input
    type="search"
    placeholder="Search products"
    class="min-w-0 flex-1 bg-transparent px-3 py-2 text-sm text-stone-900 outline-none placeholder:text-stone-400"
    [value]="searchText()"
    (input)="updateSearchText($event)"
  />
  <button
    type="button"
    class="rounded-md bg-accent px-4 py-2 text-sm font-medium text-white transition hover:cursor-pointer hover:opacity-90"
    (click)="search()"
  >
    Search
  </button>
</div>
