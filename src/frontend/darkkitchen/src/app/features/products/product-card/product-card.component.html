@if (canOpenProduct()) {
  <a
    [class]="cardClass + ' hover:-translate-y-1 hover:shadow-lg'"
    [routerLink]="['/products', product().id]"
  >
    <ng-container [ngTemplateOutlet]="productCardContent" />
  </a>
} @else {
  <article [class]="cardClass">
    <ng-container [ngTemplateOutlet]="productCardContent" />
  </article>
}

<ng-template #productCardContent>
  <div class="relative aspect-[16/9] overflow-hidden bg-stone-200">
    <img
      class="h-full w-full object-cover transition duration-500 group-hover:scale-105"
      [src]="product().imagesUrls[0]"
      [alt]="product().name"
    />

    @if (discountLabel(); as label) {
      <span
        class="absolute left-3 top-3 rounded-md bg-accent px-3 py-1 text-xs font-bold tracking-wide text-white shadow-sm"
      >
        {{ label }}
      </span>
    }
  </div>

  <div class="p-4">
    <h2 class="text-lg font-bold tracking-tight text-stone-900">{{ product().name }}</h2>

    <p class="mt-1 min-h-10 text-sm leading-5 text-stone-600">{{ product().description }}</p>

    <div class="mt-3 flex items-end justify-between gap-4">
      <span
        class="inline-flex rounded-md border border-stone-300 bg-stone-50 px-2.5 py-1 text-xs font-medium text-stone-600"
      >
        {{ product().category.name }}
      </span>

      <div class="shrink-0 text-right">
        @if (promoPriceLabel(); as promoPrice) {
          <p class="text-xs text-stone-400 line-through">{{ priceLabel() }}</p>
          <p class="text-lg font-bold text-accent">{{ promoPrice }}</p>
        } @else {
          <p class="text-lg font-bold text-stone-900">{{ priceLabel() }}</p>
        }
      </div>
    </div>
  </div>
</ng-template>
