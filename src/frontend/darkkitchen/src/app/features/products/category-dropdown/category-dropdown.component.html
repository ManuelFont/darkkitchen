<div class="relative min-w-48">
  <select
    class="w-full appearance-none rounded-lg border border-stone-300 bg-white px-4 py-3 pr-10 text-sm font-medium text-stone-700 shadow-sm transition hover:border-stone-400"
    (change)="selectCategory($event)"
  >
    <option
      value=""
      [disabled]="isFirstOptionDisabled()"
      [selected]="selectedCategoryId() === ''"
    >
      {{ disabledOptionName() }}
    </option>
    @for (category of categories(); track category.id) {
      <option
        [value]="category.id"
        [selected]="category.id === selectedCategoryId()"
      >
        {{ category.name }}
      </option>
    }
  </select>

  <span class="pointer-events-none absolute inset-y-0 right-4 flex items-center text-stone-500">
    ⌄
  </span>
</div>
