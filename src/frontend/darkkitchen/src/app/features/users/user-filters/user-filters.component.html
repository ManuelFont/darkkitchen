<form [formGroup]="form" class="flex flex-col gap-4 sm:flex-row">
  <input
    type="text"
    formControlName="search"
    placeholder="Search by name or surname…"
    class="w-full rounded-xl border border-white/10 bg-surface-raised px-5 py-2.5 text-sm text-stone-200 placeholder:text-stone-500 focus:border-brand focus:ring-1 focus:ring-brand focus:outline-none sm:flex-1"
  />

  <div class="relative sm:w-64">
    <select
      formControlName="role"
      class="w-full appearance-none rounded-xl border border-white/10 bg-surface-raised px-5 py-2.5 pr-10 text-sm text-stone-200 focus:border-brand focus:ring-1 focus:ring-brand focus:outline-none"
    >
      <option value="">All roles</option>
      @for (role of roles; track role.id) {
        <option [value]="role.name">{{ role.name }}</option>
      }
    </select>

    <svg
      class="pointer-events-none absolute top-1/2 right-3 size-4 -translate-y-1/2 text-stone-400"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
    >
      <path d="m6 9 6 6 6-6" stroke-linecap="round" stroke-linejoin="round" />
    </svg>
  </div>
</form>
