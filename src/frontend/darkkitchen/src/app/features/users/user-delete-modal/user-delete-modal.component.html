<div
  class="fixed inset-0 z-50 flex items-center justify-center overflow-y-auto bg-stone-950/60 px-4 py-8 backdrop-blur-[1px]"
>
  <section class="w-full max-w-md overflow-hidden rounded-2xl bg-white shadow-2xl">
    <div class="px-6 pt-7 pb-6 sm:px-8">
      <h2 class="text-2xl font-semibold tracking-tight text-stone-950">Delete user</h2>
      <p class="mt-2 text-base text-stone-600">
        Are you sure you want to delete
        <span class="font-semibold text-stone-900">{{ user().fullName }}</span
        >? This action cannot be undone.
      </p>
    </div>

    <footer
      class="flex flex-col-reverse gap-3 border-t border-stone-200 px-6 py-5 sm:flex-row sm:justify-end sm:px-8"
    >
      <button
        type="button"
        class="h-12 rounded-lg border border-stone-300 bg-white px-6 text-base font-semibold text-stone-900 transition hover:cursor-pointer hover:bg-stone-50"
        [disabled]="isDeleting()"
        (click)="cancelled.emit()"
      >
        Cancel
      </button>
      <button
        type="button"
        class="h-12 rounded-lg bg-red-700 px-8 text-base font-semibold text-white shadow-sm transition hover:cursor-pointer hover:bg-red-800"
        [disabled]="isDeleting()"
        (click)="confirmed.emit()"
      >
        {{ isDeleting() ? 'Deleting...' : 'Delete' }}
      </button>
    </footer>
  </section>
</div>
