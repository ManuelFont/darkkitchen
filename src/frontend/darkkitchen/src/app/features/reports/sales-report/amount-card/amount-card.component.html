@if (loading()) {
  <div
    class="flex animate-pulse items-center gap-4 rounded-2xl border border-white/10 bg-surface-raised px-5 py-5"
  >
    <div class="size-12 shrink-0 rounded-xl bg-white/10"></div>

    <div class="flex-1 space-y-2">
      <div class="h-3 w-20 rounded bg-white/10"></div>
      <div class="h-7 w-24 rounded bg-white/10"></div>
    </div>
  </div>
} @else {
  <div
    class="flex items-center gap-4 rounded-2xl border border-white/10 bg-surface-raised px-5 py-4"
  >
    <span
      class="flex size-12 shrink-0 items-center justify-center rounded-xl bg-accent-500 text-brand"
    >
      <mat-icon>{{ card().icon }}</mat-icon>
    </span>

    <div>
      <p class="text-xs font-semibold uppercase tracking-widest text-stone-400">
        {{ card().label }}
      </p>

      <p class="mt-1 text-3xl font-bold text-white">{{ card().value }}</p>
    </div>
  </div>
}
